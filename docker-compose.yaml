services:
  postgres:
    image: postgres:16
    container_name: user
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: "0000"
      POSTGRES_DB: usrdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: user_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: "1111"
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
